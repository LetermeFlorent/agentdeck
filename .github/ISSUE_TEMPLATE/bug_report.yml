name: Bug report
description: Signaler un dysfonctionnement
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: Description
      description: Que s'est-il passé ? Comportement attendu vs observé.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Étapes de reproduction
      placeholder: |
        1. Ouvrir ...
        2. Cliquer sur ...
        3. Voir l'erreur ...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Version agentdeck
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 26200"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optionnel)
      description: Colle l'extrait pertinent du fichier de log de l'app.
      render: shell
