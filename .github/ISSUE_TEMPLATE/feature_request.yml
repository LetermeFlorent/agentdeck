name: Feature request
description: Proposer une amélioration ou une nouvelle fonctionnalité
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème / besoin
      description: Quel manque ou friction motive cette demande ?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solution souhaitée
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées (optionnel)
